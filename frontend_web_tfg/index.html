<!DOCTYPE html>
<html lang="es" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RingHere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex items-center justify-center font-sans transition-colors duration-300">

    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-md w-full max-w-md border border-slate-100 dark:border-slate-700 transition-all relative">

        <div class="absolute top-5 right-5 flex gap-2">
            <button id="btnToggleLang" class="p-2 text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all group" title="Cambiar idioma">
                <span id="langIcon" class="font-bold text-xs tracking-widest group-hover:scale-110 transition-transform block">ES</span>
            </button>
            
            <button id="btnToggleTheme" class="p-2 text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all group" title="Cambiar tema">
                <span id="themeIcon" class="group-hover:scale-110 transition-transform flex items-center justify-center">
                    </span>
            </button>
        </div>

        <div class="flex flex-col items-center mb-8 mt-2">
            <img src="assets/img/Logo_ringhere.png" alt="RingHere Logo" class="w-20 h-20 object-contain shadow-sm rounded-2xl mb-4">
            
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">RingHere</h1>
            <p id="txtLoginSub" class="text-slate-400 dark:text-slate-400 text-sm mt-1">Inicia sesión en tu cuenta</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label id="lblEmail" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </span>
                    <input type="email" id="email" required
                        class="w-full pl-11 pr-4 py-3 bg-slate-100 dark:bg-slate-900/50 dark:text-white border border-transparent dark:border-slate-700 rounded-2xl text-sm focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-blue-600 outline-none transition-all placeholder-slate-400"
                        placeholder="tu@email.com">
                </div>
            </div>

            <div>
                <label id="lblPass" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="password" required
                        class="w-full pl-11 pr-12 py-3 bg-slate-100 dark:bg-slate-900/50 dark:text-white border border-transparent dark:border-slate-700 rounded-2xl text-sm focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-blue-600 outline-none transition-all placeholder-slate-400"
                        placeholder="••••••••">
                    <button type="button" id="togglePassword"
                        class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="btnSubmit"
                class="w-full py-3 bg-blue-800 text-white font-semibold rounded-2xl text-sm shadow-md shadow-blue-200 dark:shadow-none hover:bg-blue-900 active:scale-[0.98] transition-all outline-none">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-8 pt-5 border-t border-slate-100 dark:border-slate-700 text-center">
            <a href="https://github.com/Arrooyo110/TFG_RingHere/releases/download/v1.1/RingHere_v1.1.apk" class="inline-flex items-center gap-2 text-xs font-medium text-emerald-600 dark:text-emerald-400 hover:underline">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span id="txtDownload">Descarga la App Android Para Registrarte</span>
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const htmlElement = document.documentElement;
            const btnToggleTheme = document.getElementById('btnToggleTheme');
            const themeIcon = document.getElementById('themeIcon');
            const btnToggleLang = document.getElementById('btnToggleLang');
            const langIcon = document.getElementById('langIcon');

            // Iconos SVG
            const svgMoon = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>`;
            const svgSun = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>`;

            // 1. INICIALIZAR TEMA
            if (localStorage.getItem('theme') === 'dark') {
                htmlElement.classList.add('dark');
                themeIcon.innerHTML = svgSun;
            } else {
                themeIcon.innerHTML = svgMoon;
            }

            btnToggleTheme.addEventListener('click', () => {
                if (htmlElement.classList.contains('dark')) {
                    htmlElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                    themeIcon.innerHTML = svgMoon;
                } else {
                    htmlElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                    themeIcon.innerHTML = svgSun;
                }
            });

            // 2. INICIALIZAR IDIOMA
            const traduccionesLogin = {
                es: {
                    subtitle: "Inicia sesión en tu cuenta",
                    email: "Correo Electrónico",
                    pass: "Contraseña",
                    loginBtn: "Iniciar Sesión",
                    download: "Descarga la App Android para Registrarte"
                },
                en: {
                    subtitle: "Sign in to your account",
                    email: "Email address",
                    pass: "Password",
                    loginBtn: "Log In",
                    download: "Download the Android App to Sign Up"
                }
            };

            let currentLang = localStorage.getItem('lang') || 'es';

            function applyLang() {
                const t = traduccionesLogin[currentLang];
                document.getElementById('txtLoginSub').innerText = t.subtitle;
                document.getElementById('lblEmail').innerText = t.email;
                document.getElementById('lblPass').innerText = t.pass;
                document.getElementById('btnSubmit').innerText = t.loginBtn;
                document.getElementById('txtDownload').innerText = t.download;
                langIcon.innerText = currentLang === 'es' ? 'ES' : 'EN';
                localStorage.setItem('lang', currentLang);
            }

            btnToggleLang.addEventListener('click', () => {
                currentLang = currentLang === 'es' ? 'en' : 'es';
                applyLang();
            });

            applyLang();
        });
    </script>
</body>
</html>
