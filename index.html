<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RingHere</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-3xl shadow-md w-full max-w-md border border-slate-100 transition-all">

        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11.5c0-.733.056-1.45.163-2.149M12 11c.912 2.906 3.064 5.299 5.642 6.5M12 11V3m0 8c-.417 0-.83.029-1.234.087M12 3v1m0-1c2.21 0 4 1.79 4 4m-4-4c-2.21 0-4 1.79-4 4m4-4a4 4 0 00-4 4m8 0a4 4 0 00-4-4m0 4v1m0 11c3.517 0 6.799-1.009 9.571-2.753m-2.04-3.44l-.09.054A13.916 13.916 0 0011.5 9c-.733 0-1.45.056-2.149.163M11.5 9c2.906.912 5.299 3.064 6.5 5.642m-1.5-6.541A13.916 13.916 0 0115.5 11.5c0 .733-.056 1.45-.163 2.149M15.5 11.5a13.917 13.917 0 01-2.15 6.542" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-blue-900 tracking-tight">RingHere</h1>
            <p class="text-slate-400 text-sm mt-1">Sign In</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Email
                    address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </span>
                    <input type="email" id="email" required
                        class="w-full pl-11 pr-4 py-3 bg-slate-100 border-0 rounded-2xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-600 outline-none transition-all placeholder-slate-400"
                        placeholder="tu@email.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="password" required
                        class="w-full pl-11 pr-12 py-3 bg-slate-100 border-0 rounded-2xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-600 outline-none transition-all placeholder-slate-400"
                        placeholder="••••••••">
                    <button type="button" id="togglePassword"
                        class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex justify-end text-xs">
                <a href="#" class="text-blue-600 font-medium hover:underline">Forgot password?</a>
            </div>

            <button type="submit"
                class="w-full py-3 bg-blue-800 text-white font-semibold rounded-2xl text-sm shadow-md shadow-blue-200 hover:bg-blue-900 active:scale-[0.98] transition-all outline-none">
                Log In
            </button>
        </form>

        <div class="mt-8 pt-5 border-t border-slate-100 text-center">
            <a href="#" class="inline-flex items-center gap-2 text-xs font-medium text-emerald-600 hover:underline">
                <span>🤖</span> Download Android App
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
</body>

</html>
